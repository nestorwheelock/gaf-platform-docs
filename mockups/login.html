<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Gay Adventure Friends</title>
    <link rel="stylesheet" href="gaf-theme.css">
    <style>
        .login-container { max-width: 28rem; margin: 0 auto; }
        .auth-tabs { display: flex; border-bottom: 2px solid var(--border); margin: -2rem -2rem 2rem; padding: 0; }
        .auth-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .auth-tab:hover { color: var(--text); }
        .auth-tab.active {
            color: var(--primary-dark);
            border-bottom-color: var(--primary);
        }
        .btn-facebook {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            width: 100%;
            padding: 0.75rem 1.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            line-height: 1;
            background: #1877f2;
            color: #fff;
            transition: background 0.2s;
        }
        .btn-facebook:hover { background: #1565c0; }
        .btn-facebook svg { width: 20px; height: 20px; fill: #fff; }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8125rem;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { margin-bottom: 0.375rem; }
        .button-row { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
        .button-row .btn { flex: 1; }
        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8125rem;
            color: var(--primary);
            text-decoration: none;
        }
        .forgot-link:hover { text-decoration: underline; color: var(--primary-dark); }
    </style>
</head>
<body>
    <div class="bg-slideshow"></div>

    <nav>
        <div class="nav-inner">
            <a href="home.html" class="nav-logo">
                <img src="../assets/gaf-logo.png" alt="GAF">
                <span>Gay Adventure Friends</span>
            </a>
            <div class="nav-links">
                <a href="home.html">Home</a>
                <a href="home.html">About</a>
                <a href="events.html">Events</a>
                <a href="listings.html">Community</a>
                <a href="contact.html">Contact</a>
                <a href="messages.html">Messages</a>
                <a href="member.html">Profile</a>
                <a href="login.html">Login</a>
                <a href="join.html" class="btn-join">Join</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="login-container">
            <div class="glass">
                <div class="auth-tabs">
                    <button class="auth-tab active" id="tabLogin">Log In</button>
                    <button class="auth-tab" id="tabRegister">Register</button>
                </div>

                <button class="btn-facebook">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Continue with Facebook
                </button>

                <div class="divider">&mdash; or &mdash;</div>

                <div id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Your password">
                    </div>

                    <div class="button-row">
                        <button class="btn btn-primary">Log In</button>
                        <button class="btn btn-cta">Register</button>
                    </div>

                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <span class="footer-copy">Gay Adventure Friends &copy; 2025</span>
            <div class="footer-links">
                <a href="home.html">About</a>
                <a href="events.html">Events</a>
                <a href="contact.html">Contact</a>
                <a href="#">Privacy</a>
            </div>
        </div>
    </footer>

    <div class="bg-reveal"></div>

    <script src="slideshow.js"></script>
    <script>
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');

        tabLogin.addEventListener('click', function() {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
        });
        tabRegister.addEventListener('click', function() {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
        });
    </script>
</body>
</html>
